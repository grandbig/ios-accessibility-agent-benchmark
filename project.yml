name: AccessibilityBenchmark
options:
  bundleIdPrefix: com.grandbig.a11ybench
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    GENERATE_INFOPLIST_FILE: YES
    CODE_SIGN_STYLE: Automatic
targets:
  SwiftUIApp:
    type: application
    platform: iOS
    sources:
      - path: SwiftUIApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grandbig.a11ybench.swiftui
        INFOPLIST_KEY_CFBundleDisplayName: A11y SwiftUI
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
  UIKitApp:
    type: application
    platform: iOS
    sources:
      - path: UIKitApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grandbig.a11ybench.uikit
        INFOPLIST_KEY_CFBundleDisplayName: A11y UIKit
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
  SwiftUIAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SwiftUIAppUITests
    dependencies:
      - target: SwiftUIApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grandbig.a11ybench.swiftui.uitests
        TEST_TARGET_NAME: SwiftUIApp
  UIKitAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UIKitAppUITests
    dependencies:
      - target: UIKitApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grandbig.a11ybench.uikit.uitests
        TEST_TARGET_NAME: UIKitApp
schemes:
  SwiftUIApp:
    build:
      targets:
        SwiftUIApp: all
        SwiftUIAppUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: SwiftUIAppUITests
          # ツリー採取はスクリプト経由(-only-testing)で実行するため通常のtestからは除外
          skippedTests:
            - AccessibilityTreeSnapshotTests
  UIKitApp:
    build:
      targets:
        UIKitApp: all
        UIKitAppUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: UIKitAppUITests
          # ツリー採取はSwiftUIApp-Trees/UIKitApp-Treesスキームで実行するため通常のtestからは除外
          skippedTests:
            - UIKitAccessibilityTreeSnapshotTests
  # ツリー採取専用スキーム（scripts/dump-accessibility-trees.sh から使用）
  SwiftUIApp-Trees:
    build:
      targets:
        SwiftUIApp: all
        SwiftUIAppUITests: [test]
    test:
      config: Debug
      targets:
        - name: SwiftUIAppUITests
          selectedTests:
            - AccessibilityTreeSnapshotTests
  UIKitApp-Trees:
    build:
      targets:
        UIKitApp: all
        UIKitAppUITests: [test]
    test:
      config: Debug
      targets:
        - name: UIKitAppUITests
          selectedTests:
            - UIKitAccessibilityTreeSnapshotTests
